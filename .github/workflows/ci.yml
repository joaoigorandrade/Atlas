# CI (#20): typecheck, unit tests (reducers, validators, FSRS store — all
# offline), and the production build. Live-model evals (npm run eval) are
# intentionally NOT run here — they cost money and need a key.

name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      # Build-time placeholders — no real service is reached during CI.
      SUPABASE_URL: https://placeholder.supabase.co
      SUPABASE_PUBLISHABLE_KEY: sb_publishable_placeholder
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
